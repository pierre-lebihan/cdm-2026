<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;600;700&display=swap"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Make Prono Great Again — pronostics entre amis"
    />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <title>Make Prono Great Again</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      // SPA redirect handler for GitHub Pages
      (function() {
        var redirect = sessionStorage.getItem('spa-redirect')
        if (redirect) {
          sessionStorage.removeItem('spa-redirect')
          window.history.replaceState(null, '', '/' + redirect)
        }
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
